<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
/* ── Reset & base ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0A0B0F;color:#EAF2FF;
  font-family:Inter,system-ui,sans-serif;font-size:13px;line-height:1.4;
  font-variant-numeric:tabular-nums}

/* ── Layout ───────────────────────────────────────────── */
.root{display:flex;height:100vh;padding:12px 10px 8px;gap:0}
.pane{display:flex;flex-direction:column;min-width:0}
.pane-bar{flex:55}
.pane-sep{width:1px;background:rgba(120,160,200,.07);flex-shrink:0;margin:0 12px}
.pane-donut{flex:45}
.ctitle{
  font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#5E7290;padding-bottom:8px;margin-bottom:10px;
  border-bottom:1px solid rgba(120,160,200,.07);flex-shrink:0}

/* ── Barras horizontais ───────────────────────────────── */
.bars{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center;padding:0 4px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{
  width:108px;flex-shrink:0;font-size:.69rem;color:#8FA8C4;
  text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;position:relative;cursor:default}
.bar-fill{
  height:100%;border-radius:3px;position:absolute;left:0;top:0;
  transition:box-shadow .2s,border-color .2s;
  /* largura sempre fixa — regra de ouro */}
.bar-val{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:.68rem;color:#EAF2FF;white-space:nowrap}

/* Receita: corpo translúcido + borda fina. Sem glow em repouso. */
.bg-aberto {background:rgba(56,189,248,.20);border:1px solid rgba(56,189,248,.45)}
.bg-ganho  {background:rgba(52,211,153,.20);border:1px solid rgba(52,211,153,.45)}
.bg-perdido{background:rgba(248,113,113,.20);border:1px solid rgba(248,113,113,.45)}

/* Glow ativado SOMENTE no hover da linha — cursor responde, não decora */
.bar-row:hover .bg-aberto {box-shadow:0 0 9px 2px rgba(56,189,248,.52);border-color:#38BDF8}
.bar-row:hover .bg-ganho  {box-shadow:0 0 9px 2px rgba(52,211,153,.52);border-color:#34D399}
.bar-row:hover .bg-perdido{box-shadow:0 0 8px 2px rgba(248,113,113,.48);border-color:#F87171}

/* ── Donut ────────────────────────────────────────────── */
.donut-view{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;gap:6px}
#donut-svg{overflow:visible;cursor:default}

/* Camada de glow: borrada, anima opacidade (ângulo nunca muda) */
.seg-glow{animation-timing-function:ease-in-out;animation-iteration-count:infinite;
  animation-name:segGlow;pointer-events:none}
.sg0{animation-duration:4.2s;animation-delay:0s}
.sg1{animation-duration:4.5s;animation-delay:1.1s}
/* Amplitude baixa: não grita, respira */
@keyframes segGlow{0%,100%{opacity:.14}50%{opacity:.48}}

/* Foco visível nos segmentos */
.seg-base:focus-visible{outline:2px solid #9ACA3C;outline-offset:4px;border-radius:2px}
#center-g:focus-visible circle{stroke:#9ACA3C;stroke-width:2}

/* Texto central do donut */
.ct-lbl{font-size:.56rem;fill:#5E7290;font-family:Inter,system-ui,sans-serif;
  letter-spacing:.07em;text-transform:uppercase}
.ct-val{font-size:.9rem;font-weight:700;fill:#EAF2FF;font-family:Inter,system-ui,sans-serif}

/* Legenda */
.donut-legend{display:flex;gap:12px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.69rem;color:#8FA8C4;
  cursor:pointer;background:none;border:none;font-family:inherit;
  padding:2px 6px;border-radius:3px;transition:color .15s}
.leg-item:hover{color:#EAF2FF}
.leg-item:focus-visible{outline:2px solid #9ACA3C;outline-offset:2px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Modal overlay (drill-down) ──────────────────────── */
#overlay{
  position:fixed;inset:0;
  background:rgba(10,11,15,.82);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s}
#overlay.open{opacity:1;pointer-events:all}

#modal{
  background:#15171D;
  border:1px solid #2A2E38;
  border-radius:12px;
  padding:20px 22px;
  width:min(440px,92%);
  max-height:calc(100vh - 40px);
  overflow-y:auto;
  transform:translateY(10px) scale(.97);
  opacity:0;
  transition:transform .25s,opacity .25s;
  outline:none;
  scrollbar-width:thin;
  scrollbar-color:#2A2E38 transparent}
#overlay.open #modal{transform:none;opacity:1}

.md-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.md-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.md-name{font-size:.85rem;font-weight:700;color:#EAF2FF;flex:1}
.md-close{
  background:none;border:1px solid #2A2E38;color:#8FA8C4;
  font-size:.64rem;padding:3px 10px;border-radius:4px;cursor:pointer;
  font-family:inherit;transition:border-color .15s,color .15s;flex-shrink:0}
.md-close:hover{color:#EAF2FF;border-color:#5E7290}
.md-close:focus-visible{outline:2px solid #9ACA3C;outline-offset:2px;border-radius:4px}

.md-origem{
  font-size:.68rem;color:#5E7290;line-height:1.55;
  background:rgba(42,46,56,.45);border-radius:6px;
  padding:8px 10px;margin-bottom:14px;
  border-left:2px solid #2A2E38}

.md-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.dkpi{background:#1E2129;border:1px solid #20242E;border-radius:6px;padding:8px 11px}
.dkpi.full{grid-column:1/-1}
.dkl{font-size:.6rem;color:#5E7290;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.dkv{font-size:.85rem;font-weight:700;color:#EAF2FF}

.top-tit{font-size:.6rem;color:#5E7290;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.top-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.top-nm{font-size:.68rem;color:#8FA8C4;width:110px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.top-trk{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.top-bar{height:100%;border-radius:3px;transition:width .3s}
.top-vl{font-size:.65rem;color:#EAF2FF;white-space:nowrap;padding-left:5px;min-width:70px;text-align:right}

/* ── Movimento reduzido ───────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  .seg-glow{animation:none!important;opacity:.18!important}
  #overlay,#modal{transition:none!important}
  .bar-fill,.leg-item,.md-close{transition:none!important}}
</style>
</head>
<body>

<div class="root">
  <!-- Barras horizontais -->
  <div class="pane pane-bar">
    <div class="ctitle">Valor por Estágio do Funil</div>
    <div class="bars" id="bars"></div>
  </div>

  <div class="pane-sep"></div>

  <!-- Donut -->
  <div class="pane pane-donut">
    <div class="ctitle">Valor por Tipo de Cliente</div>
    <div class="donut-view" id="donut-view">
      <svg id="donut-svg" width="190" height="190" viewBox="-100 -100 200 200"
           role="group" aria-label="Rosca: distribuição do valor por tipo de cliente"></svg>
      <div class="donut-legend" id="dlegend"></div>
    </div>
  </div>
</div>

<!-- Modal overlay (drill-down) -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="md-title">
  <div id="modal" tabindex="-1">
    <div class="md-head">
      <div class="md-dot" id="md-dot"></div>
      <span class="md-name" id="md-title">—</span>
      <button class="md-close" id="md-close" aria-label="Fechar detalhe">← voltar</button>
    </div>
    <div class="md-origem" id="md-origem"></div>
    <div class="md-kpis" id="md-kpis"></div>
    <div id="md-top"></div>
    <!-- Gancho Python (comentado — futura ação de navegar ao orçamento):
         Streamlit.setComponentValue({ action: "open_tipo", tipo: currentTipo }); -->
  </div>
</div>

<script>
var D     = __DATA__;
var CALMO = __MODO_CALMO__;
var PREV  = __PREV_TOTAL__;
var RM    = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches);

/* ── Formatadores ─────────────────────────────────────── */
function fBRL(v){
  if(v==null||isNaN(+v))return"—";
  return"R "+Number(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
}
function fPct(v){return Number(v).toFixed(1).replace(".",",")+"%";}
function margemCor(p){return p>=40?"#34D399":p>=25?"#FBBF24":"#F87171";}

/* Desliga animações no modo calmo */
if(CALMO||RM){
  var cs=document.createElement("style");
  cs.textContent=".seg-glow{animation:none!important;opacity:.18!important}";
  document.head.appendChild(cs);
}

/* ── BARRAS ───────────────────────────────────────────── */
var barsEl=document.getElementById("bars");
var funil=D.funil||[];
if(!funil.length){
  barsEl.innerHTML='<div style="color:#5E7290;font-size:.75rem;padding:16px 0">Nenhum dado no período</div>';
}else{
  var maxV=funil.reduce(function(m,r){return Math.max(m,r.valor);},0);
  funil.forEach(function(r,i){
    var pct=maxV>0?(r.valor/maxV*100).toFixed(2):0;
    var valLeft="calc("+pct+"% + 7px)";
    var div=document.createElement("div");
    div.className="bar-row";
    div.setAttribute("role","img");
    div.setAttribute("aria-label",r.label+": "+fBRL(r.valor));
    div.innerHTML=
      '<div class="bar-lbl" title="'+r.status+'">'+r.label+'</div>'+
      '<div class="bar-track">'+
        '<div class="bar-fill bg-'+r.grupo+'" style="width:'+pct+'%"></div>'+
        '<span class="bar-val" style="left:'+valLeft+'">'+fBRL(r.valor)+'</span>'+
      '</div>';
    barsEl.appendChild(div);
  });
}

/* ── DONUT ────────────────────────────────────────────── */
var svg=document.getElementById("donut-svg");
var TIPOS=["Prefeitura","Cliente Direto"];
var COR={"Prefeitura":"#A78BFA","Cliente Direto":"#25E0F0"};
var R_OUT=88,R_IN=55,GAP=0.055;

/* Filtros SVG para glow */
var defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
TIPOS.forEach(function(k,i){
  var f=document.createElementNS("http://www.w3.org/2000/svg","filter");
  f.id="gf"+i;f.setAttribute("x","-60%");f.setAttribute("y","-60%");
  f.setAttribute("width","220%");f.setAttribute("height","220%");
  var b=document.createElementNS("http://www.w3.org/2000/svg","feGaussianBlur");
  b.setAttribute("stdDeviation","4");b.setAttribute("in","SourceGraphic");
  f.appendChild(b);defs.appendChild(f);
});
svg.appendChild(defs);

function donutArc(ro,ri,a0,a1){
  function pt(r,a){return[+(Math.cos(a)*r).toFixed(4),+(Math.sin(a)*r).toFixed(4)];}
  var p0o=pt(ro,a0),p1o=pt(ro,a1),p1i=pt(ri,a1),p0i=pt(ri,a0);
  var la=(a1-a0)>Math.PI?1:0;
  return["M",p0o,"A",ro,ro,0,la,1,p1o,"L",p1i,"A",ri,ri,0,la,0,p0i,"Z"].join(" ");
}

var totalCart=D.total_carteira||0;
var segs=TIPOS.map(function(k){return{key:k,val:(D.tipos[k]||{total:0}).total};});
var totalSeg=segs.reduce(function(s,d){return s+d.val;},0);
var ang=-Math.PI/2;
segs.forEach(function(s){
  var por=totalSeg>0?s.val/totalSeg:1/segs.length;
  var span=por*(2*Math.PI-GAP*segs.length);
  s.a0=ang+GAP/2;s.a1=ang+span+GAP/2;
  ang+=span+GAP;
});

var segEls=[];
segs.forEach(function(s,i){
  var col=COR[s.key];
  var d=donutArc(R_OUT,R_IN,s.a0,s.a1);

  /* Camada glow (borrada) */
  var glow=document.createElementNS("http://www.w3.org/2000/svg","path");
  glow.setAttribute("d",d);glow.setAttribute("fill",col);
  glow.setAttribute("filter","url(#gf"+i+")");
  if(!CALMO&&!RM){glow.className="seg-glow sg"+i;}else{glow.style.opacity="0.18";}
  svg.appendChild(glow);

  /* Segmento interativo */
  var path=document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",d);
  path.setAttribute("fill",col+"28");   /* ~16% alpha */
  path.setAttribute("stroke",col);
  path.setAttribute("stroke-width","2.5");
  path.setAttribute("role","button");
  path.setAttribute("tabindex","0");
  path.setAttribute("aria-label",s.key+": "+fBRL(s.val)+". Enter para detalhar.");
  path.classList.add("seg-base");
  path.style.cursor="pointer";
  path.style.transition="opacity .2s";
  path.addEventListener("click",function(){openModal(s.key,path);});
  path.addEventListener("keydown",function(e){
    if(e.key==="Enter"||e.key===" "){e.preventDefault();openModal(s.key,path);}
  });
  svg.appendChild(path);
  segEls.push({base:path,glow:glow,data:s});
});

/* Centro — total com count-up */
var cg=document.createElementNS("http://www.w3.org/2000/svg","g");
var cCirc=document.createElementNS("http://www.w3.org/2000/svg","circle");
cCirc.setAttribute("r","53");cCirc.setAttribute("fill","transparent");
cg.appendChild(cCirc);
var tLbl=document.createElementNS("http://www.w3.org/2000/svg","text");
tLbl.setAttribute("y","-12");tLbl.setAttribute("text-anchor","middle");
tLbl.classList.add("ct-lbl");tLbl.textContent="TOTAL";cg.appendChild(tLbl);
var tVal=document.createElementNS("http://www.w3.org/2000/svg","text");
tVal.setAttribute("y","8");tVal.setAttribute("text-anchor","middle");
tVal.classList.add("ct-val");tVal.id="ctotal";tVal.textContent=fBRL(0);cg.appendChild(tVal);
svg.appendChild(cg);

/* Count-up de 0 (1ª carga) ou prev → curr (rerun) */
(function countUp(from,to){
  if(RM||CALMO||Math.abs(to-from)<0.01){
    document.getElementById("ctotal").textContent=fBRL(to);return;}
  var dur=900,t0=performance.now();
  (function step(t){
    var p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);
    document.getElementById("ctotal").textContent=fBRL(from+(to-from)*e);
    if(p<1)requestAnimationFrame(step);
  })(t0);
})(PREV||0,totalCart);

/* Legenda */
TIPOS.forEach(function(k){
  var btn=document.createElement("button");
  btn.className="leg-item";
  btn.setAttribute("aria-label","Detalhar "+k);
  btn.innerHTML='<div class="leg-dot" style="background:'+COR[k]+'"></div><span>'+k+'</span>';
  btn.addEventListener("click",function(){openModal(k,btn);});
  document.getElementById("dlegend").appendChild(btn);
});

/* ── MODAL OVERLAY ────────────────────────────────────── */
var overlay=document.getElementById("overlay");
var modal  =document.getElementById("modal");
var currentTipo=null;
var triggerEl=null;

function openModal(tipo,trigger){
  var data=D.tipos[tipo];
  if(!data)return;
  currentTipo=tipo;
  triggerEl=trigger||null;
  var col=COR[tipo];
  var periodo=D.periodo||{};

  /* Linha de origem */
  var origemTxt=
    "Origem: "+data.negocios+" negócio"+(data.negocios!==1?"s":"")+" do tipo "+tipo+
    (periodo.inicio?(" no período "+periodo.inicio+"–"+periodo.fim):"")+
    ", somando os valores de orçamento. "+
    "Win rate = valor ganho ÷ (ganho + perdido). "+
    "Margem bruta = valor ganho − custo de matéria-prima.";

  /* Preenche o modal */
  document.getElementById("md-dot").style.background=col;
  document.getElementById("md-title").textContent=tipo;
  document.getElementById("md-origem").textContent=origemTxt;

  document.getElementById("md-kpis").innerHTML=
    '<div class="dkpi"><div class="dkl">Carteira</div><div class="dkv">'+fBRL(data.total)+'</div></div>'+
    '<div class="dkpi"><div class="dkl">Negócios</div><div class="dkv">'+data.negocios+'</div></div>'+
    '<div class="dkpi"><div class="dkl">Valor ganho</div><div class="dkv">'+fBRL(data.valor_ganho)+'</div></div>'+
    '<div class="dkpi"><div class="dkl">Win rate</div><div class="dkv">'+fPct(data.win_rate)+'</div></div>'+
    '<div class="dkpi full"><div class="dkl">Margem bruta</div>'+
      '<div class="dkv" style="color:'+margemCor(data.margem_pct)+'">'+fPct(data.margem_pct)+'</div></div>';

  var top=data.top||[];
  var topMax=top.length?top[0].valor:1;
  document.getElementById("md-top").innerHTML=
    top.length?
      '<div class="top-tit">Maiores contratos</div>'+
      top.map(function(t){
        var bp=topMax>0?(t.valor/topMax*100).toFixed(1):0;
        return'<div class="top-row">'+
          '<div class="top-nm" title="'+t.nome+'">'+t.nome+'</div>'+
          '<div class="top-trk"><div class="top-bar" style="width:'+bp+'%;background:'+col+'55"></div></div>'+
          '<div class="top-vl">'+fBRL(t.valor)+'</div>'+
        '</div>';
      }).join("")
    :"";

  /* Abre overlay */
  overlay.classList.add("open");
  modal.focus();
}

function closeModal(){
  overlay.classList.remove("open");
  currentTipo=null;
  if(triggerEl&&triggerEl.focus)triggerEl.focus();
  triggerEl=null;
}

document.getElementById("md-close").addEventListener("click",closeModal);

/* Fecha ao clicar no fundo (não no card) */
overlay.addEventListener("click",function(e){
  if(e.target===overlay)closeModal();
});

/* Fecha com Esc */
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"&&overlay.classList.contains("open"))closeModal();
});
</script>
</body>
</html>
